name: Update disposable domains

# Runs daily. Aggregates the sources; if the domain set is byte-identical to the
# committed one, it exits clean (no commit, no tag, no release). If it changed,
# it commits the list, bumps package versions, tags v1.0.PATCH, and cuts a
# GitHub Release with the +added/-removed delta and the list files attached.
on:
  schedule:
    - cron: "0 12 * * *" # every day 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full history + tags for the version bump

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Aggregate sources
        run: python3 aggregate.py

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet -- domains.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in domains.txt — nothing to release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute delta and next version
        if: steps.diff.outputs.changed == 'true'
        id: meta
        run: |
          count=$(grep -c . domains.txt)
          # keep the actual delta lists — the release step embeds and attaches them
          comm -13 <(git show HEAD:domains.txt | sort) <(sort domains.txt) > added.txt
          comm -23 <(git show HEAD:domains.txt | sort) <(sort domains.txt) > removed.txt
          added=$(grep -c . added.txt || true)
          removed=$(grep -c . removed.txt || true)
          latest=$(git tag -l 'v1.0.*' | sort -t. -k3 -n | tail -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            next="v1.0.$(( ${latest##*.} + 1 ))"
          fi
          {
            echo "count=$count"
            echo "added=$added"
            echo "removed=$removed"
            echo "version=$next"
          } >> "$GITHUB_OUTPUT"

      - name: Sync packages and bump versions
        if: steps.diff.outputs.changed == 'true'
        run: |
          sh scripts/sync-packages.sh
          sh scripts/set-version.sh "${{ steps.meta.outputs.version }}"

      - name: Commit, tag and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add domains.txt domains.json metadata.json packages
          git commit -m "chore: refresh disposable domains (${{ steps.meta.outputs.count }} domains)"
          git tag "${{ steps.meta.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        if: steps.diff.outputs.changed == 'true'
        env:
          # Use a PAT (not the default GITHUB_TOKEN) so the release:published
          # event actually triggers publish.yml. Events created with the built-in
          # GITHUB_TOKEN do not trigger further workflow runs — falls back to
          # github.token if RELEASE_PAT is unset (release still cut, publish won't fire).
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          added=${{ steps.meta.outputs.added }}
          removed=${{ steps.meta.outputs.removed }}
          # Embed up to LIMIT domains per list inline (collapsed); the full lists
          # are always attached as added.txt / removed.txt assets.
          LIMIT=200
          {
            echo "Automated refresh on $(date -u +%Y-%m-%d)."
            echo
            echo "- Total domains: **${{ steps.meta.outputs.count }}**"
            echo "- Added: **+${added}**"
            echo "- Removed: **-${removed}**"
            for kind in added removed; do
              n=$(grep -c . "$kind.txt" || true)
              [ "$n" -eq 0 ] && continue
              echo
              echo "<details><summary>${kind^} domains ($n)</summary>"
              echo
              echo '```'
              head -n "$LIMIT" "$kind.txt"
              [ "$n" -gt "$LIMIT" ] && echo "... and $(( n - LIMIT )) more — see $kind.txt asset"
              echo '```'
              echo
              echo "</details>"
            done
          } > release-notes.md
          gh release create "${{ steps.meta.outputs.version }}" domains.txt domains.json added.txt removed.txt \
            --title "${{ steps.meta.outputs.version }} ($(date -u +%Y-%m-%d))" \
            --notes-file release-notes.md
